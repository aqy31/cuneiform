<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المترجم المسماري الذكي (AI)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e5dfd3; /* لون طيني مستوحى من ألواح بابل */
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h1 {
            color: #5c3a21; /* بني داكن */
            margin-bottom: 5px;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        input {
            width: 90%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            text-align: center;
        }
        button {
            background-color: #5c3a21;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }
        button:hover {
            background-color: #422816;
        }
        button:disabled {
            background-color: #999;
            cursor: not-allowed;
        }
        .result-box {
            margin-top: 20px;
            padding: 20px;
            background-color: #f7f3eb;
            border: 2px dashed #5c3a21;
            border-radius: 6px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>المترجم المسماري الذكي</h1>
        <p>اكتب أي اسم بالعربي، وسيقوم الذكاء الاصطناعي بتحليله صوتياً وتحويله للمسمارية.</p>
        
        <input type="text" id="nameInput" placeholder="اكتب الاسم هنا (مثال: عبدالرحمن)" autocomplete="off">
        <button id="translateBtn" onclick="translateName()">حلل وحول إلى المسمارية</button>

        <div class="result-box" id="resultDisplay">
            النتيجة ستظهر هنا...
        </div>
    </div>

    <script>
        async function translateName() {
            const inputVal = document.getElementById('nameInput').value;
            const resultBox = document.getElementById('resultDisplay');
            const button = document.getElementById('translateBtn');
            
            if (inputVal.trim() === '') {
                resultBox.innerHTML = '<span style="color:red; font-size:16px;">يرجى كتابة اسم أولاً!</span>';
                return;
            }

            // إظهار حالة التحميل وتجميد الزر
            button.disabled = true;
            button.innerText = "جاري التحليل بالذكاء الاصطناعي...";
            resultBox.innerHTML = '<span style="color:gray; font-size:16px;">يتم الآن استدعاء خبراء بابل...</span>';

            // مفتاح الـ API الخاص بك من Groq
            const apiKey = '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'; 
            const apiUrl = 'https://api.groq.com/openai/v1/chat/completions';

            const promptText = `أنت خبير في اللغات الرافدينية القديمة (الأكدية والسومرية). قم بتحليل الاسم العربي التالي: "${inputVal}". 
            أولاً: حوّله إلى اللفظ المقطعي اللاتيني الصحيح حسب قواعد اللغة القديمة.
            ثانياً: اكتبه بالخط المسماري.
            أريد الإجابة بهذا التنسيق فقط بدون أي مقدمات أو شروحات إضافية:
            اللفظ المقطعي: [النتيجة اللاتينية]
            المسماري: [النتيجة المسمارية]`;

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "llama3-70b-8192", // الموديل الذكي والسريع من Groq
                        messages: [{"role": "user", "content": promptText}],
                        temperature: 0.3 // لضمان دقة وجدية الإجابة
                    })
                });

                const data = await response.json();
                
                if(data.error) {
                    resultBox.innerHTML = `<span style="color:red; font-size:16px;">خطأ: ${data.error.message}</span>`;
                } else {
                    // استخراج النتيجة وعرضها
                    const aiResult = data.choices[0].message.content;
                    resultBox.innerHTML = aiResult.replace(/\n/g, '<br>');
                }

            } catch (error) {
                resultBox.innerHTML = '<span style="color:red; font-size:16px;">حدث خطأ في الاتصال. تأكد من اتصالك بالإنترنت.</span>';
                console.error("Error details:", error);
            }

            // إرجاع الزر لوضعه الطبيعي بعد انتهاء التحميل
            button.disabled = false;
            button.innerText = "حلل وحول إلى المسمارية";
        }
    </script>
</body>
</html>
