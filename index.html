const SYSTEM_PROMPT = `You are an expert Arabic linguist and an automated Akkadian transliteration API.
DO NOT output conversational text. ONLY output raw space-separated syllables.

CRITICAL INSTRUCTION - THE HARAKAT (VOWEL) ENGINE:
Arabic text omits short vowels (Harakat: Damma, Fatha, Kasra). You MUST NOT assume every letter has an 'a' (Fatha). You MUST deduce the native, real-world pronunciation of the name before doing anything else.
- If the name is "ربا", you MUST know it is pronounced "Ruba" (with a Damma), so it MUST start with "ru", NOT "ra".
- If the name is "عمر", you MUST know it is "Umar" (Damma), starting with "u".
- If the name is "منير", you MUST know it is "Munir" (Damma), starting with "mu".
- If the name is "بكر", you MUST know it is "Bakr", becoming "ba ki ir".

MAPPING:
- ث=t, ج=g, غ=g, ف=p, ش=š, ص=ṣ, ض=ṣ, ط=ṭ, ظ=ṭ, ح=h, خ=h, هـ=h, س=s, ق=q

function textToCuneiform(syllablesText) {
    let processedText = syllablesText.toLowerCase()
        .replace(/ṭ/g, 'ț')
        .replace(/ṣ/g, 'ș')
        .replace(/ḥ/g, 'h')
        .replace(/š/g, 'š');

    const keysSorted = Object.keys(cuneiformMap).sort((a, b) => b.length - a.length);
    const pattern = keysSorted.join("|");
    
    let cuneiformText = processedText.replace(new RegExp(pattern, "g"), match => cuneiformMap[match] || "");
    return cuneiformText.replace(/[a-zțșš\s]/ig, ""); // مسح أي حرف لاتيني متبقي ما عدا المسماري
}

async function processName() {
    let arName = document.getElementById("arabicNameInput").value.trim();
    if (!arName) return alert("اكتب الاسم أولاً يا عيني!");

    const outputEl = document.getElementById("cuneiformOutput");
    const latinEl = document.getElementById("latinOutput");
    const loadingEl = document.getElementById("loadingOverlay");

    outputEl.innerText = "";
    latinEl.innerText = "";

    if (localNamesDictionary[arName]) {
        let syllables = localNamesDictionary[arName];
        latinEl.innerText = syllables;
        outputEl.innerText = textToCuneiform(syllables);
        return; 
    }

    loadingEl.style.display = "flex";

    try {
        const url = "https://api.groq.com/openai/v1/chat/completions";
        
        const requestBody = {
            model: "llama-3.1-8b-instant",
            messages: [
                { role: "system", content: SYSTEM_PROMPT },
                { role: "user", content: `Input: ${arName}\nOutput:` }
            ],
            temperature: 0.1
        };

        const response = await fetch(url, {
            method: "POST",
            headers: { 
                "Content-Type": "application/json",
                "Authorization": `Bearer ${GROQ_API_KEY}`
            },
            body: JSON.stringify(requestBody)
        });

        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`Error ${response.status}: ${errText}`);
        }

        const data = await response.json();
        let aiSyllables = data.choices[0].message.content;
        
        // تنظيف وحل المشاكل إجبارياً
        aiSyllables = aiSyllables.replace(/output:/ig, "")
            .replace(/[^a-zA-Zāīūṭṣšḥ\s]/ig, "")
            .replace(/\b([bcdfghjklmnpqrstvwxyz])\b/ig, "i$1") 
            .trim().toLowerCase();
        
        latinEl.innerText = aiSyllables;
        outputEl.innerText = textToCuneiform(aiSyllables);

    } catch (error) {
        console.error("خطأ:", error);
        alert("🚨 صار خطأ: " + error.message);
    } finally {
        loadingEl.style.display = "none";
    }
}

document.getElementById('arabicNameInput').addEventListener('keyup', function(event) {
    if (event.key === "Enter") processName();
});

function changeFont(fontType, btnElement) {
    document.querySelectorAll(".btn-option").forEach(b => b.classList.remove("active"));
    btnElement.classList.add("active");
    const output = document.getElementById("cuneiformOutput");
    
    if (fontType === 'sumerian') output.style.fontFamily = "'SumerianCuneiform', 'Noto Sans Cuneiform', sans-serif";
    else if (fontType === 'babylonian') output.style.fontFamily = "'BabylonianCuneiform', sans-serif";
    else if (fontType === 'assyrian') output.style.fontFamily = "'AssyrianCuneiform', sans-serif";
}

function copyCuneiform() {
    const textToCopy = document.getElementById("cuneiformOutput").innerText;
    if (!textToCopy) return alert("ماكو نص حتى نسخه!");
    navigator.clipboard.writeText(textToCopy).then(() => alert("تم النسخ بنجاح! 📋"));
}

function saveAsImage(isTransparent) {
    const captureArea = document.getElementById("captureArea");
    if (!document.getElementById("cuneiformOutput").innerText) return alert("ولد النص بالاول!");

    const originalBg = captureArea.style.backgroundColor;
    const originalBorder = captureArea.style.border;

    captureArea.style.border = "none";
    captureArea.style.backgroundColor = isTransparent ? "transparent" : "#ffffff";

    html2canvas(captureArea, {
        backgroundColor: isTransparent ? null : "#ffffff",
        scale: 4, logging: false
    }).then(canvas => {
        const link = document.createElement("a");
        link.download = isTransparent ? "AQY_Transparent.png" : "AQY_White.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
        
        captureArea.style.backgroundColor = originalBg;
        captureArea.style.border = originalBorder;
    });
}
