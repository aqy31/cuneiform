<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة التوثيق الرقمي - المسمارية</title>
    <style>
        /* الخطوط الخاصة بك */
        @font-face {
            font-family: 'Assyrian';
            src: url('AssyrianFont.ttf'); 
        }
        @font-face {
            font-family: 'Babylonian';
            src: url('BabylonianFont.ttf');
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            /* خلفية حية ودافئة */
            background: linear-gradient(135deg, #fdfbfb 0%, #e2d1c3 100%);
            min-height: 100vh;
            color: #333; 
            text-align: center; 
            padding: 40px; 
            margin: 0;
        }
        .container { 
            background: #fff; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            max-width: 650px; 
            margin: 0 auto; 
            border-top: 6px solid #8e44ad;
        }
        h1 { color: #2c3e50; }
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"], select { 
            padding: 12px; 
            font-size: 16px; 
            border: 2px solid #ccc; 
            border-radius: 6px; 
            outline: none;
        }
        input[type="text"] { width: 60%; }
        select { width: 35%; cursor: pointer; }
        
        button { 
            padding: 12px 20px; 
            font-size: 15px; 
            background-color: #2c3e50; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            margin: 5px; 
            transition: 0.3s;
            font-weight: bold;
        }
        button:hover { background-color: #1a252f; transform: translateY(-2px); }
        .btn-download-bg { background-color: #e67e22; }
        .btn-download-bg:hover { background-color: #d35400; }
        .btn-download-clear { background-color: #27ae60; }
        .btn-download-clear:hover { background-color: #2ecc71; }

        .result-box { 
            margin-top: 25px; 
            padding: 25px; 
            background: #fdfbf7; 
            border-radius: 8px; 
            border: 1px solid #e0dcd3; 
        }
        .cuneiform-text { 
            font-size: 60px; 
            margin: 20px 0; 
            color: #2c3e50; 
        }
        .syllables-text { 
            font-size: 22px; 
            color: #c0392b; 
            direction: ltr; 
            font-weight: bold;
            letter-spacing: 2px;
        }
        canvas { display: none; } 
    </style>
</head>
<body>
    <div class="container">
        <h1>مُوَلِّد الأسماء المسمارية</h1>
        <p>اختر الخط واكتب اسماً (الأسماء المدعومة للتجربة: عبدالرحمن، محمد، احمد، علي، عمر، نور)</p>
        
        <div class="controls">
            <input type="text" id="arabicName" placeholder="اكتب الاسم هنا...">
            <select id="fontSelector" onchange="updateFont()">
                <option value="Sumerian">الخط السومري (الأساسي)</option>
                <option value="Assyrian">الخط الآشوري</option>
                <option value="Babylonian">الخط البابلي</option>
            </select>
        </div>
        
        <button onclick="translateToCuneiform()">توليد النص</button>
        
        <div id="resultArea" class="result-box" style="display:none;">
            <div id="syllablesResult" class="syllables-text"></div>
            <div id="cuneiformResult" class="cuneiform-text"></div>
            
            <button onclick="copyText()">نسخ النص 📋</button>
            <br><br>
            <button class="btn-download-bg" onclick="downloadPNG(false)">تحميل صورة بخلفية 🖼️</button>
            <button class="btn-download-clear" onclick="downloadPNG(true)">تحميل صورة مفرغة (شفافة) 🔲</button>
        </div>
    </div>

    <canvas id="exportCanvas" width="3000" height="1800"></canvas>

    <script>
        const cuneiformMap = {
            "ah": "𒄴", "ma": "𒈠", "ad": "𒀜",
            "mu": "𒈬", "ha": "𒄩", "am": "𒄠",
            "ab": "𒀊", "du": "𒁺", "ul": "𒌌", "ra": "𒊏", "an": "𒀭",
            "a": "𒀀", "li": "𒇷",
            "u": "𒌋", "ar": "𒅈",
            "nu": "𒉡", "ur": "𒌫"
        };

        const nameToSyllables = {
            "احمد": ["ah", "ma", "ad"],
            "محمد": ["mu", "ha", "am", "ma", "ad"],
            "عبدالرحمن": ["ab", "du", "ul", "ra", "ah", "ma", "an"],
            "علي": ["a", "li"],
            "عمر": ["u", "ma", "ar"],
            "نور": ["nu", "ur"]
        };

        let currentCuneiform = "";

        function getFontFamily() {
            let selectedFont = document.getElementById('fontSelector').value;
            return selectedFont === "Sumerian" ? "sans-serif" : selectedFont;
        }

        function updateFont() {
            document.getElementById('cuneiformResult').style.fontFamily = getFontFamily();
        }

        function translateToCuneiform() {
            let name = document.getElementById('arabicName').value.trim();
            let syllables = nameToSyllables[name];

            if (!syllables) {
                alert("الاسم غير موجود في القاموس التجريبي.");
                return;
            }

            let syllablesStr = syllables.join(" - ").toUpperCase();
            document.getElementById('syllablesResult').innerText = syllablesStr;

            currentCuneiform = syllables.map(s => cuneiformMap[s]).join(" ");
            document.getElementById('cuneiformResult').innerText = currentCuneiform;

            document.getElementById('resultArea').style.display = 'block';
            updateFont();
        }

        function copyText() {
            navigator.clipboard.writeText(currentCuneiform).then(() => {
                alert("تم النسخ بنجاح!");
            });
        }

        function downloadPNG(isTransparent) {
            const canvas = document.getElementById('exportCanvas');
            const ctx = canvas.getContext('2d');
            let fontName = getFontFamily();

            // مسح الكانفاس بالكامل أولاً
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!isTransparent) {
                // رسم خلفية متدرجة للبطاقة
                let gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, "#1e272e");
                gradient.addColorStop(1, "#2f3640");
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // إطار داخلي
                ctx.strokeStyle = "#c0392b";
                ctx.lineWidth = 15;
                ctx.strokeRect(100, 100, canvas.width - 200, canvas.height - 200);
                ctx.strokeStyle = "#e67e22";
                ctx.lineWidth = 8;
                ctx.strokeRect(130, 130, canvas.width - 260, canvas.height - 260);

                // ترويسة
                ctx.fillStyle = "#95a5a6";
                ctx.font = "60px 'Segoe UI', Tahoma, sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("سِجِلّ التوثيق الرقمي للمسماريات", canvas.width / 2, 250);
            }

            // إعداد النص المسماري مع التحجيم التلقائي
            let baseFontSize = 450; // حجم خط عملاق مبدئي
            ctx.font = baseFontSize + "px " + fontName;
            
            // تصغير الخط تدريجياً إذا كان النص أعرض من الشاشة
            let maxWidth = canvas.width - 400; // مساحة الأمان
            while (ctx.measureText(currentCuneiform).width > maxWidth && baseFontSize > 100) {
                baseFontSize -= 20;
                ctx.font = baseFontSize + "px " + fontName;
            }

            // رسم النص المسماري
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            if (!isTransparent) {
                ctx.shadowColor = "rgba(0, 0, 0, 0.8)";
                ctx.shadowBlur = 30;
                ctx.shadowOffsetX = 10;
                ctx.shadowOffsetY = 10;
                ctx.fillStyle = "#ecf0f1"; // لون فاتح للخلفية الغامقة
            } else {
                ctx.shadowColor = "transparent";
                ctx.fillStyle = "#2c3e50"; // لون غامق للمفرغ
            }
            
            ctx.fillText(currentCuneiform, canvas.width / 2, canvas.height / 2);

            // إيقاف الظل
            ctx.shadowColor = "transparent";

            // رسم المقاطع اللاتينية أسفل النص المسماري
            ctx.font = "bold 90px sans-serif";
            ctx.fillStyle = isTransparent ? "#c0392b" : "#e67e22";
            ctx.fillText(document.getElementById('syllablesResult').innerText, canvas.width / 2, (canvas.height / 2) + 350);

            // اسم الخط المستخدم
            if (!isTransparent) {
                let selectedVal = document.getElementById('fontSelector').value;
                let fontNameArabic = selectedVal === "Assyrian" ? "الخط الآشوري" : (selectedVal === "Babylonian" ? "الخط البابلي" : "الخط السومري");
                ctx.font = "50px sans-serif";
                ctx.fillStyle = "#7f8c8d";
                ctx.fillText("النمط المُستخدَم: " + fontNameArabic, canvas.width / 2, canvas.height - 200);
            }

            // التصدير
            const link = document.createElement('a');
            link.download = 'Digital_Documentation_' + (isTransparent ? 'Transparent_' : '') + document.getElementById('arabicName').value + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
